<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rezeki Digital — Side Income Dari Telco. Guna Sendiri, Ajak Orang, Dapat Komisyen.</title>
  <meta name="description" content="Kau dah bayar telco tiap bulan tapi tak dapat apa-apa balik. Jadi ejen Eastel — guna data 500GB NO FUP, dapat komisyen tiap kali orang reload. Sekali daftar, ulang income." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:       #0f2027;
      --brand-mid:   #203a43;
      --brand-light: #2c5364;
      --accent:      #00c9a7;
      --accent-dark: #00a88b;
      --accent-soft: #e6faf6;
      --paper:       #f8f9fa;
      --warm:        #f0f4f3;
      --ink:         #111827;
      --muted:       #6b7280;
      --line:        #e5e7eb;
      --card:        #ffffff;
      --red:         #ef4444;
      --green:       #10b981;
      --yellow:      #f59e0b;
      --max:         1080px;
      --r:           10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: var(--ink);
      background: var(--paper);
      overflow-x: hidden;
    }

    h1,h2,h3,h4 { line-height: 1.2; letter-spacing: -0.02em; font-weight: 800; }
    img,video { max-width: 100%; display: block; border-radius: var(--r); }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px; }

    .kicker {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin-bottom: 14px;
    }

    .kicker.light { color: rgba(255,255,255,0.5); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 28px; border-radius: 8px;
      font-family: inherit; font-weight: 700; font-size: 15px;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn.primary { background: var(--accent); color: var(--brand); }
    .btn.primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn.ghost { background: transparent; color: var(--ink); border: 2px solid var(--line); }
    .btn.ghost:hover { border-color: var(--ink); }
    .btn.wa { background: #25d366; color: white; }
    .btn.wa:hover { background: #1fba59; transform: translateY(-1px); }
    .btn.lg { padding: 18px 36px; font-size: 17px; width: 100%; }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,32,39,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 60px; display: flex; align-items: center;
      padding: 0 24px; gap: 28px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 16px; color: white; flex-shrink: 0;
    }
    .brand-mark {
      width: 30px; height: 30px; background: var(--accent);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 900; color: var(--brand);
    }
    .nav-links { display: flex; gap: 22px; margin-left: auto; }
    .nav-links a { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.55); transition: color 0.2s; }
    .nav-links a:hover { color: white; }
    .hdr-cta {
      padding: 8px 18px; background: var(--accent);
      color: var(--brand); border-radius: 7px; font-size: 13px;
      font-weight: 700; flex-shrink: 0; transition: background 0.2s;
    }
    .hdr-cta:hover { background: var(--accent-dark); }
    @media(max-width:640px){ .nav-links { display:none; } }

    /* ══════════════════════════════
       HERO
    ══════════════════════════════ */
    .hero {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-mid) 50%, var(--brand-light) 100%);
      color: white;
      padding: 90px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(0,201,167,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 56px; align-items: center;
      position: relative;
    }

    .eyebrow {
      display: inline-block;
      background: rgba(0,201,167,0.15);
      border: 1px solid rgba(0,201,167,0.3);
      color: var(--accent);
      font-size: 12px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px;
      margin-bottom: 22px; letter-spacing: 0.05em;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 20px; color: white;
    }

    .hero h1 em { color: var(--accent); font-style: normal; }

    .hero .lead {
      font-size: 17px; color: rgba(255,255,255,0.7);
      margin-bottom: 32px; line-height: 1.75;
    }

    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }

    .hero-points { display: flex; flex-direction: column; gap: 10px; }
    .hero-points span {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: rgba(255,255,255,0.65);
    }
    .hero-points span::before {
      content: '✓';
      width: 20px; height: 20px;
      background: rgba(0,201,167,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 11px; font-weight: 900;
      flex-shrink: 0;
    }

    .hero-panel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 28px;
    }

    .plan-badge {
      background: var(--accent); color: var(--brand);
      font-size: 11px; font-weight: 800;
      padding: 4px 12px; border-radius: 20px;
      display: inline-block; margin-bottom: 20px;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .plan-highlight {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 800; color: white; margin-bottom: 4px;
    }

    .plan-price {
      font-size: 1rem; color: rgba(255,255,255,0.5); margin-bottom: 20px;
    }

    .plan-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .plan-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: rgba(255,255,255,0.8);
    }
    .plan-item .tag {
      background: rgba(0,201,167,0.15);
      border: 1px solid rgba(0,201,167,0.25);
      color: var(--accent);
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
      flex-shrink: 0;
    }

    .mini-flow {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .mini-flow span {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: rgba(255,255,255,0.55);
    }
    .mini-flow span::before { content: '→'; color: var(--accent); font-weight: 700; }

    @media(max-width:768px){
      .hero-inner { grid-template-columns: 1fr; }
      .hero-panel { display: none; }
    }

    /* ══════════════════════════════
       NOTICE
    ══════════════════════════════ */
    .notice {
      background: var(--accent); color: var(--brand);
      padding: 18px 24px; text-align: center;
    }
    .notice p { font-size: 15px; opacity: 0.75; margin-bottom: 2px; }
    .notice strong { font-size: 17px; font-weight: 800; }

    /* ══════════════════════════════
       SECTION BASE
    ══════════════════════════════ */
    .sec { padding: 80px 24px; }
    .sec-head { max-width: 660px; margin-bottom: 48px; }
    .sec-head h2 { font-size: clamp(1.6rem, 3vw, 2.2rem); margin-bottom: 14px; }
    .sec-head p { color: var(--muted); font-size: 15px; }
    .sec-head.center { text-align: center; margin-left: auto; margin-right: auto; }

    /* ══════════════════════════════
       PAIN — masalah lama
    ══════════════════════════════ */
    .pain { background: var(--warm); }
    .pain-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: start;
    }
    .pain h2 { font-size: clamp(1.7rem, 3vw, 2.3rem); margin-bottom: 0; }

    .pain-cards { display: flex; flex-direction: column; gap: 16px; }
    .pain-card {
      background: white; border-radius: var(--r);
      border: 1px solid var(--line); padding: 20px 24px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .pain-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #fef2f2; display: flex; align-items: center;
      justify-content: center; font-size: 18px; flex-shrink: 0;
    }
    .pain-card h3 { font-size: 15px; margin-bottom: 4px; }
    .pain-card p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    @media(max-width:768px){ .pain-inner { grid-template-columns: 1fr; gap: 28px; } }

    /* ══════════════════════════════
       AGITATE — korek lagi
    ══════════════════════════════ */
    .agitate {
      background: var(--brand);
      color: white;
      padding: 80px 24px;
    }
    .agitate-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; align-items: center;
    }
    .agitate h2 { font-size: clamp(1.8rem, 3vw, 2.5rem); color: white; margin-bottom: 20px; }
    .agitate h2 em { color: var(--accent); font-style: normal; }
    .agitate-copy p { color: rgba(255,255,255,0.65); font-size: 16px; line-height: 1.8; margin-bottom: 16px; }

    .math-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 28px;
    }
    .math-box .label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; display: block; }
    .math-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 15px; color: rgba(255,255,255,0.7);
    }
    .math-row:last-child { border-bottom: none; }
    .math-row strong { color: white; font-size: 16px; }
    .math-row.total { padding-top: 16px; }
    .math-row.total span { color: var(--accent); font-weight: 700; font-size: 13px; }
    .math-row.total strong { color: var(--accent); font-size: 1.4rem; }

    @media(max-width:768px){ .agitate-inner { grid-template-columns: 1fr; gap: 32px; } }

    /* ══════════════════════════════
       SOLUTION — intro produk
    ══════════════════════════════ */
    .solution { padding: 80px 24px; }
    .solution-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 56px; align-items: center;
    }
    .solution h2 { font-size: clamp(1.7rem, 3vw, 2.4rem); margin-bottom: 20px; }
    .solution h2 em { color: var(--accent-dark); font-style: normal; }
    .solution-copy p { color: var(--muted); font-size: 16px; margin-bottom: 16px; line-height: 1.8; }

    .solution-proof {
      background: var(--warm); border-radius: 16px; padding: 28px;
      border: 1px solid var(--line);
    }
    .proof-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; display: block; }
    .proof-stat { margin-bottom: 20px; }
    .proof-stat .num { font-size: 2.2rem; font-weight: 800; color: var(--accent-dark); line-height: 1; }
    .proof-stat .desc { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .proof-divider { height: 1px; background: var(--line); margin: 20px 0; }
    .proof-list { display: flex; flex-direction: column; gap: 10px; }
    .proof-list li {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--ink);
    }
    .proof-list li::before { content: '✓'; color: var(--green); font-weight: 900; }

    @media(max-width:768px){ .solution-inner { grid-template-columns: 1fr; gap: 32px; } }

    /* ══════════════════════════════
       PLANS — pakej data
    ══════════════════════════════ */
    .plans { background: var(--warm); padding: 80px 24px; }
    .plans-inner { max-width: var(--max); margin: 0 auto; }
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .plan-card {
      background: var(--card); border-radius: var(--r);
      border: 2px solid var(--line); padding: 28px;
      position: relative; transition: border-color 0.2s;
    }
    .plan-card:hover { border-color: var(--accent); }
    .plan-card.popular {
      border-color: var(--accent);
      background: linear-gradient(160deg, #e6faf6 0%, white 100%);
    }
    .pop-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--brand);
      font-size: 11px; font-weight: 800; padding: 4px 14px;
      border-radius: 20px; letter-spacing: 0.06em; white-space: nowrap;
    }
    .plan-name { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; }
    .plan-price-big { font-size: 2.2rem; font-weight: 800; color: var(--ink); line-height: 1; }
    .plan-price-big span { font-size: 1rem; font-weight: 600; color: var(--muted); }
    .plan-data { font-size: 1.1rem; font-weight: 800; color: var(--accent-dark); margin: 10px 0 4px; }
    .no-fup {
      display: inline-block; background: var(--accent-soft);
      border: 1px solid var(--accent); color: var(--accent-dark);
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 16px;
    }
    .plan-features { display: flex; flex-direction: column; gap: 7px; }
    .plan-features li { font-size: 13px; color: var(--muted); display: flex; gap: 7px; }
    .plan-features li::before { content: '✓'; color: var(--green); font-weight: 900; flex-shrink: 0; }

    /* ══════════════════════════════
       INCOME — macam mana buat duit
    ══════════════════════════════ */
    .income { padding: 80px 24px; }
    .income-inner { max-width: var(--max); margin: 0 auto; }
    .income-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px; margin-top: 48px;
    }
    .income-card {
      background: var(--card); border-radius: var(--r);
      border: 1px solid var(--line); padding: 28px;
    }
    .income-card .step-num {
      font-size: 3rem; font-weight: 800;
      color: var(--accent); opacity: 0.2;
      line-height: 1; margin-bottom: 12px;
    }
    .income-card h3 { font-size: 1.05rem; margin-bottom: 8px; }
    .income-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* komisyen calculator */
    .komisyen-box {
      background: var(--brand); border-radius: 16px;
      padding: 36px; margin-top: 48px; color: white;
    }
    .komisyen-box h3 { color: white; margin-bottom: 6px; }
    .komisyen-box .sub { color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 28px; }
    .komisyen-tiers {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px;
    }
    .tier {
      background: rgba(255,255,255,0.07);
      border-radius: 10px; padding: 18px; text-align: center;
    }
    .tier .pct { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
    .tier .lv { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .tier .desc { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; }
    .komisyen-example {
      background: rgba(0,201,167,0.1); border: 1px solid rgba(0,201,167,0.2);
      border-radius: 10px; padding: 20px;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; text-align: center;
    }
    .komisyen-example .ex-item .num { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .komisyen-example .ex-item .lbl { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }

    @media(max-width:640px){
      .komisyen-tiers { grid-template-columns: 1fr; }
      .komisyen-example { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════
       SYSTEM — chip tags
    ══════════════════════════════ */
    .system { background: var(--warm); padding: 60px 24px; }
    .system-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center;
    }
    .system h2 { font-size: clamp(1.5rem, 2.5vw, 2rem); margin-bottom: 14px; }
    .system p { font-size: 15px; color: var(--muted); }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; }
    .chips span {
      background: white; border: 1px solid var(--line);
      border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600;
    }
    @media(max-width:768px){ .system-inner { grid-template-columns: 1fr; gap: 28px; } }

    /* ══════════════════════════════
       STEPS
    ══════════════════════════════ */
    .steps-sec { padding: 80px 24px; }
    .steps-inner { max-width: var(--max); margin: 0 auto; }
    .steps-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px;
    }
    .step-card {
      background: var(--card); border-radius: var(--r);
      border: 1px solid var(--line); padding: 24px; position: relative;
    }
    .step-num-big {
      font-size: 2.8rem; font-weight: 800; color: var(--accent);
      opacity: 0.18; line-height: 1; margin-bottom: 12px;
    }
    .step-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .step-card p { font-size: 13px; color: var(--muted); }

    /* ══════════════════════════════
       CHECKOUT
    ══════════════════════════════ */
    .checkout { background: var(--warm); padding: 80px 24px; }
    .checkout-inner { max-width: var(--max); margin: 0 auto; }

    .shariah-note {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--accent-soft); border: 1px solid var(--accent);
      border-radius: var(--r); padding: 18px 22px;
      max-width: 580px; margin: 0 auto 32px; font-size: 14px;
    }
    .shariah-note .icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .shariah-note strong { display: block; margin-bottom: 4px; color: var(--accent-dark); }
    .shariah-note p { color: var(--muted); }

    .starter-card {
      background: var(--brand);
      border-radius: 16px; padding: 36px;
      max-width: 560px; margin: 0 auto 28px;
      text-align: center; color: white;
    }
    .starter-card .plan-badge-lg {
      background: var(--accent); color: var(--brand);
      font-size: 12px; font-weight: 800;
      padding: 5px 16px; border-radius: 20px;
      display: inline-block; margin-bottom: 16px;
    }
    .starter-card h3 { font-size: 1.4rem; color: white; margin-bottom: 8px; }
    .starter-card .price-main { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .starter-card .price-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .starter-items {
      display: flex; flex-direction: column; gap: 10px;
      text-align: left; margin-bottom: 28px;
    }
    .starter-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: rgba(255,255,255,0.75);
    }
    .starter-item::before { content: '✓'; color:
